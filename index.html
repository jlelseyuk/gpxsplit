<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>GPX Route Splitter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="shortcut icon" href="/favicon.ico">

    <style>
        body {
            font-family: "Figtree", "Arial", "Helvetica", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-size: 16px;
            margin: 0;
        }
        header {
            padding: 10px;
            background: #111827;
            color: white;
        }
        header .title {
            display: flex;
            align-items: center;
            flex-direction: row-reverse;
            justify-content: start;
            gap: 8px;
            margin-bottom: 1rem;
        }
        header .title h1 {
            font-size: 28px;
            margin: 0;
        }
        header .title img {
            width: 60px;
            height: 60px;
            border-radius: 6px;
        }
        header .small {
            font-size: 14px;
            margin-bottom: .3rem;
        }
        .controls {
            padding: 10px;
        }
        .controls .step-bar {
            position: relative;
            height: 10px;
            background-color: #ddd;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .controls .step-bar .step-fill {
            height: 100%;
            width: 0%;
            background-color: #0975dc;
            border-radius: 5px;
            transition: width 0.5s ease-in-out;
        }
        @keyframes flash {
            0% { background-color: #0975dc; }
            50% { background-color: #33a1ff; }
            100% { background-color: #0975dc; }
        }
        .controls .step-bar .step-fill.flash {
            animation: flash 0.5s ease-in-out;
        }
        .controls #status {
            display: block;
            color: #0975dc;
            margin-bottom: 10px;
        }
        .controls .upload-form {
            display: flex;
            flex-direction: row;
            gap: 16px;
            font-family: "Figtree", "Arial", "Helvetica", sans-serif;
        }
        .controls .upload-form .file-upload input[type="file"] {
            display: none;
        }
        .controls .upload-form .file-upload {
            display: flex;
            align-items: center;
            border: 2px dotted #a0bed9;
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
            flex-grow: 1;
            transition: all 300ms ease-in-out;
        }
        .controls .upload-form .file-upload:hover {
            border-color: #0975dc;
        }
        .controls .upload-form .file-upload-button {
            background-color: #0975dc;
            color: #ffffff;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .controls .upload-form .file-upload:hover .file-upload-button {
            background-color: #075fb3;
        }
        .controls .upload-form .file-upload .file-upload-text {
            margin-left: 12px;
            font-size: 14px;
            color: #555;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .controls .upload-form .submit-button {
            background-color: #0975dc;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 300ms ease-in-out;
        }
        .controls .upload-form .submit-button:hover {
            background-color: #075fb3;
        }
        .controls .upload-form .submit-button:disabled {
            background-color: #a8a8a8;
        }
        .controls .upload-form .submit-button:disabled:hover {
            cursor: default;
            background-color: #a8a8a8;
        }
        .map-wrapper #map {
            height: calc(100vh - 410px);
        }
        .map-wrapper #map .leaflet-popup-content {
            text-align: center;
        }
        footer {
            color: #ffffff;
            background-color: #0975dc;
            padding: 5px;
        }
        footer .subtitle {
            font-size: 14px;
            text-align: center;
            margin: .5rem 0;
        }
        footer .subtitle a {
            color: #ffffff;
            transition: all 300ms ease-in-out;
        }
        footer .subtitle a:hover {
            opacity: .6;
        }
        @media (max-width: 767px) {
            .controls .upload-form {
                display: flex;
                gap: 8px;
                flex-direction: column;
            }
            .map-wrapper {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="title">
        <h1>GPX Route Splitter</h1>
        <img src="logo.png" alt="GPX Route Splitter" loading="eager">
    </div>
    <p class="small">
        Upload your GPX file and choose up to 3 split points, the original route will then be split into sequential
        parts when you click to export.
    </p>
</header>

<main>

<div class="controls">
    <div class="step-bar">
        <div class="step-fill" id="stepFill"></div>
    </div>

    <span id="status"></span>

    <form class="upload-form">
        <label class="file-upload">
            <input id="gpxInput" type="file" name="file">
            <span class="file-upload-button">Choose GPX File</span>
            <span class="file-upload-text">No file chosen...</span>
        </label>
        <button id="exportBtn" type="submit" class="submit-button" disabled>
            Export Split GPX Files
        </button>
    </form>
</div>

<div class="map-wrapper">
    <div id="map"></div>
</div>

</main>

<footer>
    <p class="subtitle">
        Developed by <a href="https://www.jameselsey.com" target="_blank">James Elsey</a>
    </p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([0, 0], 2);

    let routeLayer;
    let routePoints = [];
    let startMarker = null;
    let endMarker = null;
    let splitMarkers = [];

    const startIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
    const splitIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
    const endIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    function setStep(stage) {
        const fill = document.getElementById('stepFill');
        let width = '0%';
        let statusText = '';

        switch (stage) {
            case 1:
                width = '33%';
                statusText = 'Step 1: Ready to upload a GPX file.';
                break;
            case 2:
                width = '66%';
                statusText = 'Step 2: GPX uploaded. Click on the map to add/remove up to 3 split points.';
                break;
            case 3:
                width = '100%';
                statusText = 'Step 3: Split point(s) added. Ready to export!';
                break;
        }

        fill.style.width = width;
        document.getElementById('status').textContent = statusText;

        fill.classList.remove('flash');
        void fill.offsetWidth;
        fill.classList.add('flash');
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.querySelector('.file-upload-text').textContent = file.name;

        splitMarkers.forEach(m => map.removeLayer(m));
        splitMarkers = [];
        if (startMarker) map.removeLayer(startMarker);
        if (endMarker) map.removeLayer(endMarker);
        if (routeLayer) map.removeLayer(routeLayer);

        document.getElementById('exportBtn').disabled = true;
        setStep(1);

        const reader = new FileReader();
        reader.onload = () => parseGPX(reader.result);
        reader.readAsText(file);
    }

    function parseGPX(text) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, 'application/xml');
        const trkpts = [...xml.getElementsByTagName('trkpt')];

        routePoints = trkpts.map(pt => [
            parseFloat(pt.getAttribute('lat')),
            parseFloat(pt.getAttribute('lon'))
        ]);

        routeLayer = L.polyline(routePoints, { color: 'blue' }).addTo(map);
        startMarker = L.marker(routePoints[0], { icon: startIcon }).addTo(map).bindPopup('Start');
        endMarker = L.marker(routePoints[routePoints.length - 1], { icon: endIcon }).addTo(map).bindPopup('End');

        map.fitBounds(routeLayer.getBounds());
        map.on('click', handleSplitClick);

        setStep(2);
    }

    function updateStepBar() {
        if (splitMarkers.length === 0) {
            setStep(2);
        } else {
            setStep(3);
        }
    }

    function handleSplitClick(e) {
        if (splitMarkers.length >= 3) return;

        const nearestIndex = findNearestPointIndex(e.latlng);
        const nearestPoint = routePoints[nearestIndex];

        const marker = L.marker(nearestPoint, { icon: splitIcon, draggable: false })
            .addTo(map)
            .bindPopup(`Split ${splitMarkers.length + 1}`)
            .openPopup();
        marker._routeIndex = nearestIndex;

        marker.on('click', () => {
            map.removeLayer(marker);
            splitMarkers = splitMarkers.filter(m => m !== marker);
            updateStepBar();
            document.getElementById('exportBtn').disabled = splitMarkers.length === 0;
        });

        splitMarkers.push(marker);
        updateStepBar();
        document.getElementById('exportBtn').disabled = false;
    }

    function findNearestPointIndex(latlng) {
        let minDist = Infinity;
        let idx = 0;
        routePoints.forEach((pt, i) => {
            const d = map.distance(latlng, L.latLng(pt));
            if (d < minDist) {
                minDist = d;
                idx = i;
            }
        });
        return idx;
    }

    function exportGPX() {
        if (splitMarkers.length === 0) return;
        const originalFile = document.getElementById('gpxInput').files[0];
        if (!originalFile) return;
        const baseName = originalFile.name.replace(/\.gpx$/i, '');

        const indexes = splitMarkers.map(m => m._routeIndex).sort((a, b) => a - b);

        const segments = [];
        let startIdx = 0;
        indexes.forEach((idx) => {
            segments.push(routePoints.slice(startIdx, idx + 1));
            startIdx = idx;
        });
        segments.push(routePoints.slice(startIdx));

        segments.forEach((pts, i) => {
            downloadGPX(pts, `${baseName}_part${i + 1}.gpx`);
        });
    }

    function downloadGPX(points, filename) {
        const gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX Route Splitter">\n<trk><trkseg>\n${
            points.map(p => `<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`).join('\n')
        }\n</trkseg></trk></gpx>`;

        const blob = new Blob([gpx], { type: 'application/gpx+xml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
    }

    document.getElementById('gpxInput').addEventListener('change', handleFile);
    document.getElementById('exportBtn').addEventListener('click', exportGPX);

    setStep(1);
</script>

</body>
</html>
