<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>GPX Route Splitter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles.css">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="shortcut icon" href="/favicon.ico">
</head>

<body>

<header>
    <a href="/" class="title">
        <h1>GPX Route Splitter</h1>
        <img src="logo.png" alt="GPX Route Splitter" loading="eager">
    </a>
    <p class="small">
        Upload your GPX file and choose up to 3 split points, the original route will then be split into sequential
        parts when you click to export.
    </p>
</header>

<main>
    <div class="controls">
        <div class="step-bar">
            <div id="stepFill" class="step-fill"></div>
        </div>

        <span id="status"></span>

        <form class="upload-form">
            <label class="file-upload">
                <input id="gpxInput" type="file" name="file">
                <span class="file-upload-button">Choose GPX File</span>
                <span class="file-upload-text">No file chosen...</span>
            </label>
            <button id="exportBtn" type="submit" class="submit-button" disabled>
                Export Split GPX Files
            </button>
        </form>

        <div id="downloadSection" class="download" style="display: none;">
            <h2>Download parts:</h2>

            <div id="downloadList"></div>

            <a id="resetBtn" class="reset-link">
                Reset
            </a>
        </div>
    </div>

    <div class="map-wrapper">
        <div id="map"></div>
    </div>
</main>

<footer>
    <p class="subtitle">
        Built by <a href="https://www.jameselsey.com" target="_blank">James Elsey</a>
    </p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="/scripts.js"></script>

</body>
</html>
